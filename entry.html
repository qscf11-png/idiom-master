<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能學習大師 - 選擇練習模組</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .hero-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .hero-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl w-full">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-black text-slate-900 mb-4 tracking-tighter">全能學習大師</h1>
            <p class="text-slate-400 font-bold text-lg">Vocab Master • Version 3.8 Dual Mode</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <!-- 英文+成語版 (恢復舊版功能) -->
            <div onclick="location.href='index.html'" class="hero-card glass rounded-[3rem] p-10 flex flex-col items-center text-center border-t-4 border-indigo-500">
                <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mb-8">
                    <span class="text-4xl text-indigo-600">🔤</span>
                </div>
                <h2 class="text-3xl font-black mb-4">英文 & 成語</h2>
                <p class="text-slate-500 font-medium mb-8">恢復最完整功能：Level 篩選、字首提示、填空暗示。最純粹的語文練習體驗。</p>
                <div class="mt-auto w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 uppercase tracking-widest text-sm">進入單字本</div>
            </div>

            <!-- 數學專區 (獨立模組) -->
            <div onclick="location.href='math.html'" class="hero-card glass rounded-[3rem] p-10 flex flex-col items-center text-center border-t-4 border-slate-900">
                <div class="w-20 h-20 bg-slate-100 rounded-3xl flex items-center justify-center mb-8">
                    <span class="text-4xl">📐</span>
                </div>
                <h2 class="text-3xl font-black mb-4">國中數學</h2>
                <p class="text-slate-500 font-medium mb-8">獨立數學專區：支援 KaTeX 美化排版。畢氏定理、二次函數觀念測驗。</p>
                <div class="mt-auto w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg shadow-slate-200 uppercase tracking-widest text-sm">進入數學專區</div>
            </div>
        </div>

        <p class="text-center mt-12 text-slate-300 font-bold text-xs uppercase tracking-widest">Designed for Premium Learning Experience</p>
    </div>
</body>
</html>
